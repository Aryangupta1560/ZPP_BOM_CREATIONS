# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zbom
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my433482.s4hana.cloud.sap/
          scp: true
        app:
          name: ZPP_BOMCREATION
          package: ZPP_BOM_CREATIONS
          transport: REPLACE_WITH_TRANSPORT
        exclude:
          - /test/
